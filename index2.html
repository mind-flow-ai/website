<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mindflow.ai - AI-Powered Business Insights</title>
    <style>
        /* Modern CSS styles */
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --text-color: #333;
            --background-color: #f4f4f4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--background-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        nav ul {
            display: flex;
            list-style-type: none;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--secondary-color);
            font-weight: 600;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--primary-color);
        }

        main {
            margin-top: 80px;
        }

        section {
            padding: 80px 0;
        }

        h1, h2 {
            margin-bottom: 20px;
            color: var(--secondary-color);
        }

        h1 {
            font-size: 2.5rem;
        }

        h2 {
            font-size: 2rem;
        }

        p {
            margin-bottom: 20px;
        }

        button {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            border-radius: 5px;
        }

        button:hover {
            background-color: #2980b9;
        }

        #hero {
            background-color: var(--secondary-color);
            color: #fff;
            text-align: center;
            padding: 100px 0;
            position: relative;
            overflow: hidden;
        }

        #hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://example.com/path-to-your-image.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: 1;
        }

        #hero .container {
            position: relative;
            z-index: 2;
        }

        #hero h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        #hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        #benefits, #how-it-works, #use-cases, #about {
            background-color: #fff;
        }

        #benefits ul, #use-cases ul {
            list-style-type: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        #benefits li, #use-cases li {
            background-color: var(--background-color);
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        #how-it-works ol {
            counter-reset: item;
            list-style-type: none;
            padding-left: 0;
        }

        #how-it-works li {
            counter-increment: item;
            margin-bottom: 20px;
            padding-left: 50px;
            position: relative;
        }

        #how-it-works li::before {
            content: counter(item);
            background-color: var(--primary-color);
            color: #fff;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 50%;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        footer {
            background-color: var(--secondary-color);
            color: #fff;
            text-align: center;
            padding: 20px 0;
        }

        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
            }

            nav ul {
                margin-top: 20px;
            }

            nav ul li {
                margin: 0 10px;
            }

            #hero h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <img src="logo.png" alt="mindflow.ai logo" style="height: 50px; width: auto;">
            <nav>
                <ul>
                    <li><a href="#benefits">Benefits</a></li>
                    <li><a href="#how-it-works">How It Works</a></li>
                    <li><a href="#use-cases">Use Cases</a></li>
                    <li><a href="#about">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="hero">
            <div class="container">
                <h1>Revolutionize Your Business with AI-Powered Insights</h1>
                <p>mindflow.ai transforms complex data into actionable intelligence, driving smarter decisions and boosting productivity.</p>
                <button>Start Your Free Trial</button>
            </div>
        </section>

        <!-- Rest of the HTML remains unchanged -->

    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 mindflow.ai. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
